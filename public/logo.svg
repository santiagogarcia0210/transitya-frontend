<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44" fill="none">
  <defs>
    <linearGradient id="lgBg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="lgBody" x1="4" y1="9" x2="4" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#e0eaff" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <!-- === ICON (40x40 centered in 44px height, 2px margin) === -->
  <g transform="translate(2, 2)">
    <rect width="40" height="40" rx="10" fill="url(#lgBg)"/>
    <rect x="4" y="9" width="32" height="16" rx="3.5" fill="url(#lgBody)"/>
    <rect x="6.5" y="12" width="20" height="6.5" rx="1.8" fill="#1e40af"/>
    <rect x="7.5" y="12.8" width="6" height="1.5" rx="0.7" fill="rgba(255,255,255,0.18)"/>
    <rect x="28.5" y="11.5" width="5.5" height="8" rx="1.5" fill="#bfdbfe"/>
    <line x1="31.2" y1="11.5" x2="31.2" y2="19.5" stroke="#93c5fd" stroke-width="0.8"/>
    <rect x="4" y="23.5" width="32" height="1.5" rx="0.8" fill="rgba(148,163,184,0.4)"/>
    <rect x="4" y="19" width="4" height="3.5" rx="1.2" fill="#fde68a"/>
    <circle cx="12" cy="27.5" r="4.5" fill="#172554"/>
    <circle cx="28" cy="27.5" r="4.5" fill="#172554"/>
    <circle cx="12" cy="27.5" r="2.2" fill="#1e3a8a"/>
    <circle cx="28" cy="27.5" r="2.2" fill="#1e3a8a"/>
    <circle cx="11.2" cy="26.7" r="0.8" fill="rgba(255,255,255,0.30)"/>
    <circle cx="27.2" cy="26.7" r="0.8" fill="rgba(255,255,255,0.30)"/>
    <circle cx="35" cy="7" r="3" fill="#fbbf24"/>
    <circle cx="35" cy="7" r="1.3" fill="#fde68a"/>
  </g>

  <!-- === WORDMARK === -->
  <!-- "Transit" -->
  <text x="54" y="30"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="19" font-weight="600" letter-spacing="-0.4"
    fill="#e8eaf6">Transit</text>
  <!-- "·Ya" accent -->
  <text x="130" y="30"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
    font-size="19" font-weight="800" letter-spacing="-0.4"
    fill="#60a5fa">·Ya</text>
</svg>
